<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioskop Mirroring</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* ================= CSS TEMA BIOSKOP ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container SPA */
        .page {
            display: none; /* Disembunyikan secara default */
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .active {
            display: flex; /* Ditampilkan saat aktif */
        }

        h1 {
            color: #66fcf1;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
        }

        p { margin-bottom: 20px; color: #a1a1a1; }

        /* Tombol Neon */
        button {
            background: transparent;
            color: #66fcf1;
            border: 2px solid #66fcf1;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }

        button:hover {
            background: #66fcf1;
            color: #0b0c10;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.6);
        }

        /* Pilihan Perangkat (Landing Page) */
        .device-selector {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Efek Layar Bioskop (Receiver Page) */
        .theater-container {
            position: relative;
            width: 85vw;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 10px;
            /* Efek Glow Layar */
            box-shadow: 0 0 50px rgba(102, 252, 241, 0.15), 0 0 100px rgba(255, 255, 255, 0.05);
            z-index: 2;
            object-fit: contain;
        }

        /* Simulasi Pantulan Cahaya Lantai */
        .floor-reflection {
            width: 95%;
            height: 80px;
            background: linear-gradient(to bottom, rgba(102, 252, 241, 0.1), transparent);
            filter: blur(15px);
            transform: perspective(300px) rotateX(60deg);
            margin-top: -20px;
            z-index: 1;
        }

        .status { margin-top: 15px; font-style: italic; color: #45a29e; }
    </style>
</head>
<body>

    <div id="landing-page" class="page active">
        <h1>Tentukan Peran Perangkat Ini</h1>
        <div class="device-selector">
            <button onclick="navigateTo('sender-page')">📱 HANDPHONE (Pengirim)</button>
            <button onclick="navigateTo('receiver-page')">💻 LAPTOP / PC (Penerima)</button>
        </div>
    </div>

    <div id="sender-page" class="page">
        <h1>Mode Pengirim</h1>
        <p>Klik tombol di bawah untuk mulai membagikan layar HP Anda.</p>
        <button onclick="startScreenShare()">Mulai Siarkan Layar</button>
        <p id="sender-status" class="status"></p>
        <button style="border-color: #ff4655; color: #ff4655;" onclick="location.reload()">Kembali</button>
    </div>

    <div id="receiver-page" class="page">
        <h1 style="font-size: 1.5rem; margin-bottom: 10px;">Bioskop Virtual</h1>
        <button id="connect-btn" onclick="connectToPhone()">Sambungkan ke Layar HP</button>
        <p id="receiver-status" class="status"></p>
        
        <div class="theater-container" style="display: none;" id="theater-ui">
            <video id="theater-video" autoplay playsinline muted></video>
            <div class="floor-reflection"></div>
        </div>
        <button style="border-color: #ff4655; color: #ff4655; margin-top: 30px;" onclick="location.reload()">Kembali</button>
    </div>

    <script>
        // Room ID statis untuk mempertemukan Sender dan Receiver
        const STATIC_ROOM_ID = 'teater-mirroring-rahasia-123';
        let peer = null;

        // Fungsi Navigasi SPA sederhana
        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // ================= LOGIKA PENGIRIM (HP) =================
        async function startScreenShare() {
            const statusText = document.getElementById('sender-status');
            
            try {
                // 1. Meminta izin menangkap layar (Tergantung dukungan browser HP)
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { cursor: "always" }, 
                    audio: true 
                });

                statusText.innerText = "Layar berhasil ditangkap! Menyiapkan server...";

                // 2. Inisialisasi PeerJS sebagai HOST dengan ID Statis
                peer = new Peer(STATIC_ROOM_ID);

                peer.on('open', (id) => {
                    statusText.innerText = `Menyiarkan... Menunggu Laptop terhubung.`;
                });

                // 3. Jika ada Laptop yang menelepon, jawab dengan stream layar kita
                peer.on('call', (call) => {
                    call.answer(stream);
                    statusText.innerText = "Laptop terhubung! Layar sedang disiarkan.";
                });

                // Jika pengguna menghentikan share screen bawaan browser
                stream.getVideoTracks()[0].onended = () => {
                    statusText.innerText = "Siaran layar dihentikan.";
                };

            } catch (err) {
                console.error("Gagal menangkap layar:", err);
                statusText.innerText = `Gagal: ${err.message}. (Browser HP mungkin tidak mendukung ini)`;
            }
        }

        // ================= LOGIKA PENERIMA (LAPTOP) =================
        function connectToPhone() {
            const statusText = document.getElementById('receiver-status');
            const connectBtn = document.getElementById('connect-btn');
            
            statusText.innerText = "Menghubungkan ke HP...";

            // 1. Inisialisasi PeerJS dengan ID acak (karena dia tamu)
            peer = new Peer();

            peer.on('open', () => {
                // 2. Lakukan panggilan WebRTC ke ID Statis milik HP
                const call = peer.call(STATIC_ROOM_ID, null); // null karena kita tidak mengirim stream balik

                if (!call) {
                    statusText.innerText = "Gagal memanggil. Pastikan HP sudah 'Mulai Siarkan Layar' duluan.";
                    return;
                }

                // 3. Menerima stream layar dari HP
                call.on('stream', (remoteStream) => {
                    statusText.innerText = "";
                    connectBtn.style.display = "none"; // Sembunyikan tombol connect
                    document.getElementById('theater-ui').style.display = "flex"; // Tampilkan bioskop
                    
                    const videoElem = document.getElementById('theater-video');
                    videoElem.srcObject = remoteStream;
                });
            });

            peer.on('error', (err) => {
                console.error(err);
                statusText.innerText = "Error: Pastikan HP sudah menyiarkan layar terlebih dahulu.";
            });
        }
    </script>
</body>
</html>
