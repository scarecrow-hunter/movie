<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioskop Mirroring - Streamer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* ================= CSS TEMA BIOSKOP ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .page {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .active { display: flex; }

        h1 {
            color: #66fcf1;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
        }

        p { margin-bottom: 20px; color: #a1a1a1; }

        button, .file-label {
            background: transparent;
            color: #66fcf1;
            border: 2px solid #66fcf1;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
            display: inline-block;
        }

        button:hover, .file-label:hover {
            background: #66fcf1;
            color: #0b0c10;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.6);
        }

        .device-selector {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Efek Layar Bioskop */
        .theater-container {
            position: relative;
            width: 85vw;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(102, 252, 241, 0.15), 0 0 100px rgba(255, 255, 255, 0.05);
            z-index: 2;
            object-fit: contain;
        }

        .floor-reflection {
            width: 95%;
            height: 80px;
            background: linear-gradient(to bottom, rgba(102, 252, 241, 0.1), transparent);
            filter: blur(15px);
            transform: perspective(300px) rotateX(60deg);
            margin-top: -20px;
            z-index: 1;
        }

        .status { margin-top: 15px; font-style: italic; color: #45a29e; font-weight: bold; }
    </style>
</head>
<body>

    <div id="landing-page" class="page active">
        <h1>Tentukan Peran Perangkat</h1>
        <div class="device-selector">
            <button onclick="navigateTo('sender-page')">📱 HANDPHONE (Pengirim Film)</button>
            <button onclick="navigateTo('receiver-page')">💻 LAPTOP / PC (Layar Bioskop)</button>
        </div>
    </div>

    <div id="sender-page" class="page">
        <h1>Mode Pengirim (HP)</h1>
        <p>Pilih file video/film dari galeri HP Anda untuk diputar di Bioskop Laptop.</p>
        
        <input type="file" id="video-file" accept="video/*" style="display: none;" onchange="handleFileSelect(event)">
        <label for="video-file" class="file-label">🎬 Pilih & Putar Film</label>
        
        <video id="local-hidden-video" style="display:none;" controls autoplay playsinline muted loop></video>
        
        <p id="sender-status" class="status"></p>
        <button style="border-color: #ff4655; color: #ff4655; margin-top: 20px;" onclick="location.reload()">Kembali</button>
    </div>

    <div id="receiver-page" class="page">
        <h1 style="font-size: 1.5rem; margin-bottom: 10px;">Layar Bioskop Virtual</h1>
        <button id="connect-btn" onclick="connectToPhone()">Sambungkan ke HP</button>
        <p id="receiver-status" class="status"></p>
        
        <div class="theater-container" style="display: none;" id="theater-ui">
            <video id="theater-video" autoplay playsinline controls></video>
            <div class="floor-reflection"></div>
        </div>
        <button style="border-color: #ff4655; color: #ff4655; margin-top: 30px;" onclick="location.reload()">Kembali</button>
    </div>

    <script>
        const STATIC_ROOM_ID = 'teater-mirroring-rahasia-123';
        let peer = null;
        let streamToSend = null;

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // ================= LOGIKA HP (SENDER) =================
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const statusText = document.getElementById('sender-status');
            const videoElem = document.getElementById('local-hidden-video');

            statusText.innerText = "Memuat file film...";
            
            // Masukkan file video ke dalam elemen video internal HP
            videoElem.src = URL.createObjectURL(file);
            
            // Ketika video siap diputar, ambil stream visual & audionya
            videoElem.onplaying = () => {
                statusText.innerText = "Mengekstrak sinyal film... Menghubungkan ke PeerJS...";
                
                try {
                    // Mengambil stream internal video (Didukung penuh oleh Chrome Android & iOS Safari!)
                    streamToSend = videoElem.captureStream ? videoElem.captureStream() : videoElem.mozCaptureStream();
                    initPeerAsHost(statusText);
                } catch (e) {
                    statusText.innerText = "Browser HP Anda tidak mendukung streaming file langsung.";
                    statusText.style.color = "#ff4655";
                }
            };
        }

        function initPeerAsHost(statusText) {
            if (peer) peer.destroy();

            peer = new Peer(STATIC_ROOM_ID);

            peer.on('open', (id) => {
                statusText.innerText = "🍿 Film Siap! Silakan tekan 'Sambungkan' di Laptop Anda.";
                statusText.style.color = "#66fcf1";
            });

            // Jika laptop tersambung, langsung kirimkan video film tersebut
            peer.on('call', (call) => {
                call.answer(streamToSend);
                statusText.innerText = "🎥 Bioskop Terhubung! Film sedang diputar di Laptop.";
            });

            peer.on('error', (err) => {
                console.error(err);
                statusText.innerText = "Gagal membuat jaringan teater.";
                statusText.style.color = "#ff4655";
            });
        }

        // ================= LOGIKA LAPTOP (RECEIVER) =================
        function connectToPhone() {
            const statusText = document.getElementById('receiver-status');
            const connectBtn = document.getElementById('connect-btn');
            
            statusText.innerText = "Mencari sinyal film dari HP...";
            statusText.style.color = "#66fcf1";

            peer = new Peer();

            peer.on('open', () => {
                const call = peer.call(STATIC_ROOM_ID, null);

                if (!call) {
                    statusText.innerText = "Gagal memanggil. Pastikan Anda sudah memilih film di HP.";
                    return;
                }

                call.on('stream', (remoteStream) => {
                    statusText.innerText = "";
                    connectBtn.style.display = "none";
                    document.getElementById('theater-ui').style.display = "flex";
                    
                    const videoElem = document.getElementById('theater-video');
                    videoElem.srcObject = remoteStream;
                    
                    // Otomatis play di sisi laptop
                    videoElem.play().catch(e => {
                        statusText.innerText = "Klik area video untuk mengaktifkan suara bioskop.";
                    });
                });
            });

            peer.on('error', (err) => {
                console.error(err);
                statusText.innerText = "Koneksi Gagal. Pastikan HP sudah dalam posisi memutar film.";
                statusText.style.color = "#ff4655";
            });
        }
    </script>
</body>
</html>
